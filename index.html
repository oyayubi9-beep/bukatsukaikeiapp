<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2c3e50">
<title>部活会計入力</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>部活会計入力</h1>
  <div class="topbar-actions">
    <button id="updateBtn" class="ghost-btn hidden">🔄 更新確認</button>
    <button id="signoutBtn" class="ghost-btn hidden">ログアウト</button>
  </div>
</header>

<!-- ログイン画面 -->
<section id="loginView" class="screen">
  <div class="login-card">
    <p class="login-lead">会計担当のGoogleアカウントでログインしてください</p>
    <button id="signinBtn" class="primary-btn">Googleでログイン</button>
    <p id="loginError" class="error-text"></p>
  </div>
</section>

<!-- モード選択画面 -->
<section id="modeSelectView" class="screen hidden">
  <div class="mode-select-card">
    <h2 class="mode-title">モードを選んでください</h2>
    <button id="modeInputBtn" class="primary-btn">✏️ 入力する</button>
    <button id="modeEditBtn" class="primary-btn mode-edit-btn">📋 修正・削除する</button>
  </div>
</section>

<!-- メイン画面 -->
<main id="mainView" class="screen hidden">
  <button id="mainBackBtn" class="back-link">← モード選択へ戻る</button>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="ledger">仕訳入力</button>
    <button class="tab-btn" data-tab="dues">部費入金</button>
    <button class="tab-btn" data-tab="special">上位大会</button>
  </nav>

  <!-- タブ1: 一般会計 仕訳入力 -->
  <section id="tab-ledger" class="tab-panel active">
    <form id="ledgerForm" class="entry-form">
      <label>日付
        <input type="date" id="l_date" required>
      </label>

      <label>摘要（内容）
        <input type="text" id="l_memo" placeholder="例：教則本3冊" required>
      </label>

      <label>分類
        <select id="l_category" required></select>
      </label>

      <fieldset class="money-fieldset">
        <legend>収入・支出・振替</legend>
        <div class="seg-control" id="l_kind">
          <button type="button" class="seg-btn active" data-kind="income">収入</button>
          <button type="button" class="seg-btn" data-kind="expense">支出</button>
          <button type="button" class="seg-btn" data-kind="transfer">振替（現金⇔口座）</button>
        </div>

        <div id="l_incomeBlock">
          <label>収入科目
            <select id="l_incomeAccount"></select>
          </label>
          <label>収入金額（円）
            <input type="number" id="l_incomeAmount" min="0" inputmode="numeric">
          </label>
        </div>

        <div id="l_expenseBlock" class="hidden">
          <label>支出科目
            <select id="l_expenseAccount"></select>
          </label>
          <label>支出金額（円）
            <input type="number" id="l_expenseAmount" min="0" inputmode="numeric">
          </label>
        </div>

        <div id="l_transferBlock" class="hidden">
          <label>振替方向
            <select id="l_transferDir">
              <option value="現金→口座">現金 → 口座</option>
              <option value="口座→現金">口座 → 現金</option>
            </select>
          </label>
          <label>振替金額（円）
            <input type="number" id="l_transferAmount" min="0" inputmode="numeric">
          </label>
        </div>
      </fieldset>

      <label id="l_payLabel">支払手段
        <select id="l_payment" required></select>
      </label>

      <label>領収書（任意）
        <input type="file" id="l_receipt" accept="image/*" capture="environment">
        <span id="l_receiptName" class="file-hint"></span>
      </label>

      <label>備考（任意）
        <input type="text" id="l_note">
      </label>

      <button type="submit" class="primary-btn">記録する</button>
      <p id="l_status" class="status-text"></p>
    </form>
  </section>

  <!-- タブ2: 部費入金記録 -->
  <section id="tab-dues" class="tab-panel">
    <form id="duesForm" class="entry-form">
      <label>部員
        <select id="d_member" required></select>
      </label>
      <label>対象月
        <select id="d_month" required></select>
      </label>
      <label>状態
        <div class="seg-control" id="d_status">
          <button type="button" class="seg-btn active" data-status="○">支払済み（○）</button>
          <button type="button" class="seg-btn" data-status="×">未払い（×）</button>
          <button type="button" class="seg-btn" data-status="－">免除（－）</button>
        </div>
      </label>
      <button type="submit" class="primary-btn">記録する</button>
      <p id="d_status_msg" class="status-text"></p>
    </form>
  </section>

  <!-- タブ3: 上位大会特別会計 -->
  <section id="tab-special" class="tab-panel">
    <form id="specialForm" class="entry-form">
      <label>大会（特別会計シート）
        <select id="s_sheet" required></select>
      </label>

      <label>日付
        <input type="date" id="s_date" required>
      </label>

      <label>摘要（内容）
        <input type="text" id="s_memo" required>
      </label>

      <fieldset class="money-fieldset">
        <legend>収入・支出・振替</legend>
        <div class="seg-control" id="s_kind">
          <button type="button" class="seg-btn active" data-kind="income">収入</button>
          <button type="button" class="seg-btn" data-kind="expense">支出</button>
          <button type="button" class="seg-btn" data-kind="transfer">振替（現金⇔口座）</button>
        </div>

        <div id="s_incomeBlock">
          <label>収入科目
            <select id="s_incomeAccount"></select>
          </label>
          <label>収入金額（円）
            <input type="number" id="s_incomeAmount" min="0" inputmode="numeric">
          </label>
        </div>

        <div id="s_expenseBlock" class="hidden">
          <label>支出科目
            <select id="s_expenseAccount"></select>
          </label>
          <label>支出金額（円）
            <input type="number" id="s_expenseAmount" min="0" inputmode="numeric">
          </label>
        </div>

        <div id="s_transferBlock" class="hidden">
          <label>振替方向
            <select id="s_transferDir">
              <option value="現金→口座">現金 → 口座</option>
              <option value="口座→現金">口座 → 現金</option>
            </select>
          </label>
          <label>振替金額（円）
            <input type="number" id="s_transferAmount" min="0" inputmode="numeric">
          </label>
        </div>
      </fieldset>

      <label id="s_payLabel">支払手段
        <select id="s_payment" required></select>
      </label>

      <label>領収書（任意）
        <input type="file" id="s_receipt" accept="image/*" capture="environment">
        <span id="s_receiptName" class="file-hint"></span>
      </label>

      <label>備考（任意）
        <input type="text" id="s_note">
      </label>

      <button type="submit" class="primary-btn">記録する</button>
      <p id="s_status" class="status-text"></p>
    </form>
  </section>

</main>

<!-- 修正・削除画面 -->
<section id="editView" class="screen hidden">
  <button id="editBackBtn" class="back-link">← モード選択へ戻る</button>
  <nav class="tabbar">
    <button class="edit-tab-btn active" data-etab="ledger">仕訳入力</button>
    <button class="edit-tab-btn" data-etab="special">上位大会</button>
  </nav>
  <div id="editSheetSelectRow" class="hidden">
    <label class="edit-sheet-label">大会を選択
      <select id="edit_sheet"></select>
    </label>
  </div>
  <p id="editListStatus" class="status-text edit-list-status"></p>
  <div id="editList"></div>
</section>

<!-- 詳細修正モーダル -->
<div id="editDetailModal" class="modal-overlay hidden">
  <div class="modal-card">
    <h3 class="modal-title">記録を修正する</h3>
    <form id="editDetailForm" class="entry-form">
      <label>日付
        <input type="date" id="e_date">
      </label>
      <label>摘要（内容）
        <input type="text" id="e_memo">
      </label>
      <label id="e_categoryLabel">分類
        <select id="e_category"></select>
      </label>
      <fieldset class="money-fieldset">
        <legend>収入・支出・振替</legend>
        <div class="seg-control" id="e_kind">
          <button type="button" class="seg-btn active" data-kind="income">収入</button>
          <button type="button" class="seg-btn" data-kind="expense">支出</button>
          <button type="button" class="seg-btn" data-kind="transfer">振替</button>
        </div>
        <div id="e_incomeBlock">
          <label>収入科目
            <select id="e_incomeAccount"></select>
          </label>
          <label>収入金額（円）
            <input type="number" id="e_incomeAmount" min="0" inputmode="numeric">
          </label>
        </div>
        <div id="e_expenseBlock" class="hidden">
          <label>支出科目
            <select id="e_expenseAccount"></select>
          </label>
          <label>支出金額（円）
            <input type="number" id="e_expenseAmount" min="0" inputmode="numeric">
          </label>
        </div>
        <div id="e_transferBlock" class="hidden">
          <label>振替方向
            <select id="e_transferDir">
              <option value="現金→口座">現金 → 口座</option>
              <option value="口座→現金">口座 → 現金</option>
            </select>
          </label>
          <label>振替金額（円）
            <input type="number" id="e_transferAmount" min="0" inputmode="numeric">
          </label>
        </div>
      </fieldset>
      <label id="e_payLabel">支払手段
        <select id="e_payment"></select>
      </label>
      <label>領収書（差し替える場合のみ）
        <input type="file" id="e_receipt" accept="image/*" capture="environment">
        <span id="e_receiptName" class="file-hint"></span>
      </label>
      <label>備考（任意）
        <input type="text" id="e_note">
      </label>
      <p id="e_status" class="status-text"></p>
      <button type="submit" class="primary-btn">保存する</button>
      <button type="button" id="editDetailClose" class="cancel-btn">キャンセル</button>
    </form>
  </div>
</div>

<!-- 領収書差し替えモーダル -->
<div id="receiptReplaceModal" class="modal-overlay hidden">
  <div class="modal-card">
    <h3 class="modal-title">領収書を差し替える</h3>
    <p class="modal-desc">新しい領収書を撮影またはファイルを選択してください。</p>
    <label>
      <input type="file" id="rr_receipt" accept="image/*" capture="environment">
      <span id="rr_receiptName" class="file-hint"></span>
    </label>
    <p id="rr_status" class="status-text"></p>
    <button id="rr_uploadBtn" class="primary-btn" style="margin-top:12px">アップロードして更新</button>
    <button id="rr_cancelBtn" class="cancel-btn">キャンセル</button>
  </div>
</div>

<!-- アップロード中オーバーレイ -->
<div id="uploadOverlay" class="upload-overlay hidden">
  <div class="upload-overlay-box">
    <div class="spinner"></div>
    <p class="upload-overlay-text">アップロード中です</p>
    <p class="upload-overlay-sub">完了するまでこの画面を<br>閉じないでください</p>
  </div>
</div>

<!-- 未完了アップロード確認モーダル -->
<div id="pendingUploadModal" class="modal-overlay hidden">
  <div class="modal-card">
    <h3 class="modal-title">未完了の送信があります</h3>
    <p class="modal-desc">前回、完了していない領収書の送信があります。再送信しますか？</p>
    <button id="pendingRetryBtn" class="primary-btn">再送信する</button>
    <button id="pendingDeleteBtn" class="cancel-btn">削除する（送信しない）</button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
